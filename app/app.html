<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排便日誌アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#f5f5f2;
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.wrap{
  max-width:480px;
  width:100%;
  margin:0 auto;
  padding:40px 24px 60px;
}

/* ロゴエリア */
.logo-area{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:36px;
}
.logo-icon{
  width:72px;
  height:72px;
  background:#E1F5EE;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:14px;
  box-shadow:0 2px 12px rgba(15,110,86,0.12);
}
.logo-title{
  font-size:20px;
  font-weight:600;
  color:#1a1a18;
  letter-spacing:-0.01em;
  margin-bottom:4px;
}
.logo-sub{
  font-size:12px;
  color:#888780;
  font-weight:400;
}

/* カードエリア */
.card{
  background:#fff;
  border-radius:16px;
  padding:24px 20px;
  margin-bottom:16px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.card-title{
  font-size:13px;
  font-weight:600;
  color:#1a1a18;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card-title .badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;
  height:22px;
  background:#E1F5EE;
  border-radius:50%;
  font-size:12px;
  color:#0F6E56;
  font-weight:700;
  flex-shrink:0;
}

/* 機能リスト */
.feat-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.feat-item{
  display:flex;
  align-items:flex-start;
  gap:10px;
  font-size:13px;
  color:#3d3d38;
  line-height:1.55;
}
.feat-item .icon{
  font-size:18px;
  flex-shrink:0;
  margin-top:1px;
}

/* 利用条件 */
.req-box{
  background:#f0faf6;
  border:0.5px solid #5DCAA5;
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:16px;
}
.req-box p{
  font-size:12px;
  color:#085041;
  line-height:1.7;
}
.req-box .req-title{
  font-size:11px;
  font-weight:600;
  color:#0F6E56;
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:6px;
}

/* CTAボタン */
.cta-btn{
  display:block;
  width:100%;
  padding:16px;
  background:#0F6E56;
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  font-family:inherit;
  text-align:center;
  cursor:pointer;
  text-decoration:none;
  transition:background .15s, transform .1s;
  letter-spacing:.01em;
}
.cta-btn:active{
  background:#085041;
  transform:scale(0.99);
}

/* 注記 */
.note{
  text-align:center;
  font-size:11px;
  color:#b4b2a9;
  margin-top:14px;
  line-height:1.7;
}
.note a{
  color:#888780;
  text-decoration:underline;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo-area">
    <div class="logo-icon">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="8" width="28" height="22" rx="5" fill="#1D9E75" opacity="0.2"/>
        <rect x="5" y="8" width="28" height="22" rx="5" stroke="#0F6E56" stroke-width="1.5"/>
        <path d="M11 19h16M11 14h10M11 24h8" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="29" cy="10" r="5" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
        <path d="M27 10l1.5 1.5L31 8.5" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-title">排便日誌アプリ</div>
    <div class="logo-sub">ふじみ小児科クリニック</div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="badge">✓</span>
      このアプリでできること
    </div>
    <div class="feat-list">
      <div class="feat-item">
        <span class="icon">📋</span>
        <span>毎日の排便の状態（回数・性状・量）を記録できます</span>
      </div>
      <div class="feat-item">
        <span class="icon">💊</span>
        <span>お薬の飲み忘れや服薬状況を確認できます</span>
      </div>
      <div class="feat-item">
        <span class="icon">📅</span>
        <span>過去の記録をカレンダーやグラフで振り返ることができます</span>
      </div>
      <div class="feat-item">
        <span class="icon">🏥</span>
        <span>受診時に記録を先生と共有できます（共有は任意です）</span>
      </div>
    </div>
  </div>

  <div class="req-box">
    <div class="req-title">ご利用にあたって</div>
    <p>本アプリのご利用には、ふじみ小児科クリニックの患者であることが必要です。ログインにはヨヤクルのアカウント（診察券番号・パスワード）をお使いください。</p>
  </div>

  <a class="cta-btn" href="/app/consent">使用を開始する</a>

  <p class="note">
    ご利用にあたって<a href="#">プライバシーポリシー</a>をご確認ください。<br>
    ご不明な点はクリニックスタッフまでお声がけください。
  </p>

</div>
</body>
</html>
