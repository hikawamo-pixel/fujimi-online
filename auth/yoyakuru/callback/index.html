<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン処理中 — 排便日誌アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#f5f5f2;
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.wrap{
  max-width:360px;
  width:100%;
  margin:0 auto;
  padding:40px 24px;
  text-align:center;
}

/* スピナー */
.spinner-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
.spinner{
  width:52px;
  height:52px;
  border:3px solid #E1F5EE;
  border-top-color:#0F6E56;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-title{
  font-size:15px;
  font-weight:600;
  color:#1a1a18;
}
.spinner-sub{
  font-size:12px;
  color:#888780;
  line-height:1.6;
  margin-top:-8px;
}

/* 成功表示 */
.success-wrap{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.success-icon{
  width:60px;
  height:60px;
  background:#E1F5EE;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.success-title{
  font-size:16px;
  font-weight:600;
  color:#0F6E56;
}
.success-sub{
  font-size:12px;
  color:#5f5e5a;
  line-height:1.7;
  margin-top:-4px;
}
.redirect-note{
  font-size:11px;
  color:#b4b2a9;
  margin-top:4px;
}

/* エラー表示 */
.error-wrap{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.error-icon{
  width:60px;
  height:60px;
  background:#FAEEDA;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}
.error-title{
  font-size:15px;
  font-weight:600;
  color:#633806;
}
.error-detail{
  font-size:12px;
  color:#5f5e5a;
  line-height:1.7;
  background:#fff;
  border-radius:10px;
  padding:12px 16px;
  border:0.5px solid #e4e3df;
  text-align:left;
  width:100%;
}
.error-code{
  font-size:11px;
  color:#b4b2a9;
  font-family:monospace;
  margin-top:6px;
  word-break:break-all;
}
.retry-btn{
  display:block;
  width:100%;
  padding:13px;
  background:#0F6E56;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  text-decoration:none;
  margin-top:4px;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- ローディング -->
  <div class="spinner-wrap" id="loadingView">
    <div class="spinner"></div>
    <div class="spinner-title">ログイン処理中…</div>
    <div class="spinner-sub">少々お待ちください</div>
  </div>

  <!-- 成功 -->
  <div class="success-wrap" id="successView">
    <div class="success-icon">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <path d="M6 15l6 6 12-12" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="success-title">ログイン完了</div>
    <div class="success-sub" id="successMsg">認証が完了しました。</div>
    <div class="redirect-note">アプリに移動します…</div>
  </div>

  <!-- エラー -->
  <div class="error-wrap" id="errorView">
    <div class="error-icon">⚠️</div>
    <div class="error-title">ログインに失敗しました</div>
    <div class="error-detail" id="errorDetail">
      認証処理中にエラーが発生しました。
      <div class="error-code" id="errorCode"></div>
    </div>
    <a class="retry-btn" href="/app/consent">最初からやり直す</a>
  </div>

  <!-- 受診期限切れ -->
  <div class="error-wrap" id="expiredView" style="display:none;">
    <div class="error-icon">🏥</div>
    <div class="error-title">受診後にご利用ください</div>
    <div class="error-detail">
      このアプリをご利用いただくには、<br>
      直近3ヶ月以内の受診が必要です。<br><br>
      次回ご来院の際に、スタッフまでお申し付けください。
    </div>
  </div>

</div>

<script>
/* ============================================================
   設定
   ============================================================ */
const SUPABASE_URL    = 'https://fdaveqbwobuivgqpvxer.supabase.co';
const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkYXZlcWJ3b2J1aXZncXB2eGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjE4OTIsImV4cCI6MjA5MTM5Nzg5Mn0.5y_M-VuGPPGcQI7g9ZyX8DUxu2I480BfQZQbgQJxTxE';
const EDGE_FN_URL     = SUPABASE_URL + '/functions/v1/authenticate-patient';
const PATIENT_APP     = '/app/patient';
const CONSENT_VERSION = 'v1.0';

/* ============================================================
   UI ヘルパー
   ============================================================ */
function showLoading(){ show('loadingView'); hide('successView'); hide('errorView'); }
function showSuccess(msg){ hide('loadingView'); showFlex('successView'); hide('errorView');
  document.getElementById('successMsg').textContent = msg || '認証が完了しました。'; }
function showError(msg, code){ hide('loadingView'); hide('successView'); showFlex('errorView');
  document.getElementById('errorDetail').childNodes[0].textContent = msg || 'エラーが発生しました。';
  document.getElementById('errorCode').textContent = code || ''; }
function showExpired(){ hide('loadingView'); hide('successView'); hide('errorView');
  show('expiredView'); }
function show(id){ const el = document.getElementById(id); if(el) el.style.display = 'block'; }
function hide(id){ const el = document.getElementById(id); if(el) el.style.display = 'none'; }
function showFlex(id){ const el = document.getElementById(id); if(el) el.style.display = 'flex'; }

/* ============================================================
   URLパラメータ取得
   ヨヤクルから: ?patient_id=00001&last_visit=2025-03-15
   ============================================================ */
function extractParams(){
  const p = new URLSearchParams(window.location.search);
  const chartRaw  = p.get('patient_id');
  const lastVisit = p.get('last_visit') || null;

  const chartNumber = (chartRaw && /^\d{1,5}$/.test(chartRaw.trim()))
    ? chartRaw.trim().padStart(5, '0')
    : null;

  return { chartNumber, lastVisit };
}

/* ============================================================
   localStorageから同意情報を読み取る
   ============================================================ */
function getConsentInfo(){
  try{
    return {
      consentGiven:   localStorage.getItem('consentGiven') === 'true',
      consentVersion: localStorage.getItem('consentVersion') || CONSENT_VERSION,
      localTimestamp: localStorage.getItem('consentTimestamp') || null,
    };
  }catch(e){
    return { consentGiven: false, consentVersion: CONSENT_VERSION, localTimestamp: null };
  }
}

/* ============================================================
   Edge Function 呼び出し
   ============================================================
   フロントから chart_number を渡す。
   HMAC生成・受診日チェック・DB保存はすべてサーバー側で行う。
   フロントは patient_key のみ受け取る（chart_number は往復しない）。
   ============================================================ */
async function callAuthenticatePatient({ chartNumber, lastVisit, consentGiven, consentVersion, localTimestamp }){
  const res = await fetch(EDGE_FN_URL, {
    method: 'POST',
    headers:{
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON,
      'Authorization': 'Bearer ' + SUPABASE_ANON,
    },
    body: JSON.stringify({
      chart_number:    chartNumber,
      last_visit:      lastVisit,
      consent_given:   consentGiven,
      consent_version: consentVersion,
      local_timestamp: localTimestamp,
    })
  });

  let json = null;
  try{ json = await res.json(); }catch(e){}
  return { httpOk: res.ok, status: res.status, data: json };
}

/* ============================================================
   patient_key をlocalStorageに保存してアプリへ遷移
   chart_number はここで破棄し、保存しない
   ============================================================ */
function redirectToApp(patientKey){
  try{
    localStorage.setItem('patientKey', patientKey);   // HMAC済みキーのみ保存
    localStorage.removeItem('consentGiven');
    localStorage.removeItem('consentTimestamp');
    localStorage.removeItem('consentVersion');
    localStorage.removeItem('patientId');             // 旧キー（残存していれば削除）
  }catch(e){}
  setTimeout(()=>{ window.location.href = PATIENT_APP; }, 1200);
}

/* ============================================================
   メイン処理
   ============================================================ */
async function handleCallback(){
  showLoading();

  // 1. URLパラメータ取得
  const { chartNumber, lastVisit } = extractParams();

  if(!chartNumber){
    const params = new URLSearchParams(window.location.search);
    const paramStr = [...params.entries()].map(([k,v])=>`${k}=${v}`).join(', ') || '（パラメータなし）';
    showError(
      'ヨヤクルから診察券番号を受け取れませんでした。\nクリニックにお問い合わせください。',
      'params: ' + paramStr
    );
    return;
  }

  // 2. 同意情報取得
  const { consentGiven, consentVersion, localTimestamp } = getConsentInfo();

  try{
    // 3. Edge Function 呼び出し
    //    - HMAC生成、受診日チェック、DB保存はすべてサーバー側
    //    - フロントは patient_key のみ受け取る
    const result = await callAuthenticatePatient({
      chartNumber, lastVisit, consentGiven, consentVersion, localTimestamp
    });

    // 4. 受診期限切れ
    if(result.data?.reason === 'visit_expired'){
      showExpired();
      return;
    }

    // 5. その他エラー
    if(!result.httpOk || !result.data?.ok){
      const reason = result.data?.reason || 'unknown';
      const detail = result.data?.detail || '';
      throw new Error(`Edge Function error: ${reason} ${detail}`);
    }

    // 6. 成功 → patient_key を保存してアプリへ
    const patientKey = result.data.patient_key;
    showSuccess('ようこそ。アプリに移動します。');
    redirectToApp(patientKey);

  }catch(err){
    console.error('Callback error:', err);
    showError(
      '処理中にエラーが発生しました。しばらくしてから再度お試しください。',
      err.message
    );
  }
}

// 実行
handleCallback();
</script>
</body>
</html>
